<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Lifecycle of Machine Learning</title>
<style>
  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    background-color: #ffffff;
    margin: 0;
  }
  .diagram-container {
    position: relative;
    width: 800px;
    height: 650px;
    background: transparent;
  }
  .sphere {
    position: absolute;
    width: 130px;
    height: 130px;
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    box-shadow: 
      inset -10px -10px 20px rgba(0,0,0,0.3),
      inset 10px 10px 20px rgba(255,255,255,0.6),
      5px 10px 15px rgba(0,0,0,0.4);
    border: 3px solid rgba(255,255,255,0.4);
    text-align: center;
    color: white;
    font-weight: bold;
    font-size: 15px;
    line-height: 1.2;
    padding-top: 50px;
    box-sizing: border-box;
    text-shadow: 1px 2px 2px rgba(0,0,0,0.6);
  }
  .center-pill {
    position: absolute;
    width: 320px;
    height: 120px;
    left: 240px;
    top: 265px;
    border-radius: 60px;
    background: radial-gradient(ellipse at 30% 30%, #3a5b88, #162c4a);
    box-shadow: 
      inset -5px -5px 15px rgba(0,0,0,0.5),
      inset 5px 5px 15px rgba(255,255,255,0.3),
      5px 10px 15px rgba(0,0,0,0.5);
    border: 4px solid #6c8db8;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    color: white;
    font-weight: bold;
    font-size: 26px;
    text-shadow: 2px 3px 4px rgba(0,0,0,0.7);
  }
  .icon {
    position: absolute;
    top: 25px;
    width: 40px;
    height: 40px;
    fill: none;
    stroke: white;
    stroke-width: 2.5;
    stroke-linecap: round;
    stroke-linejoin: round;
    filter: drop-shadow(1px 2px 2px rgba(0,0,0,0.5));
  }
  
  /* Gradients */
  .bg-orange { background: radial-gradient(circle at 30% 30%, #ffac4d, #d1470b); }
  .bg-green  { background: radial-gradient(circle at 30% 30%, #88e061, #28801d); }
  .bg-yellow { background: radial-gradient(circle at 30% 30%, #ffde59, #cc8000); }
  .bg-red    { background: radial-gradient(circle at 30% 30%, #f47e6d, #be1b11); }
  .bg-purple { background: radial-gradient(circle at 30% 30%, #a289ce, #462c72); }

</style>
</head>
<body>

<div class="diagram-container">
  
  <!-- SVG Arrows -->
  <svg width="800" height="650" style="position:absolute; top:0; left:0; z-index:0;">
    <defs>
      <marker id="arrowhead" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
        <polygon points="0 0, 8 4, 0 8" fill="#5c718a" />
      </marker>
      <filter id="dropshadow" x="-20%" y="-20%" width="140%" height="140%">
        <feDropShadow dx="2" dy="4" stdDeviation="3" flood-opacity="0.3"/>
      </filter>
    </defs>
    
        <path d="M 501.68416076895005 96.61363558934977 A 250 250 0 0 1 579.8349500846628 151.33540738525068" 
              fill="none" stroke="#5c718a" stroke-width="8" 
              marker-end="url(#arrowhead)" filter="url(#dropshadow)" />
        
        <path d="M 648.6304738420683 351.13211581691337 A 250 250 0 0 1 620.7368982147318 442.3678906964727" 
              fill="none" stroke="#5c718a" stroke-width="8" 
              marker-end="url(#arrowhead)" filter="url(#dropshadow)" />
        
        <path d="M 451.97792270443983 569.5369001834514 A 250 250 0 0 1 356.58795558326744 571.201938253052" 
              fill="none" stroke="#5c718a" stroke-width="8" 
              marker-end="url(#arrowhead)" filter="url(#dropshadow)" />
        
        <path d="M 183.49364905389032 450.0 A 250 250 0 0 1 152.4329828146074 359.7932752400163" 
              fill="none" stroke="#5c718a" stroke-width="8" 
              marker-end="url(#arrowhead)" filter="url(#dropshadow)" />
        
        <path d="M 214.21379363065145 157.71734841028544 A 250 250 0 0 1 290.4072133027306 100.30148842520828" 
              fill="none" stroke="#5c718a" stroke-width="8" 
              marker-end="url(#arrowhead)" filter="url(#dropshadow)" />
        
  </svg>

  <div class="center-pill">
    <div>Lifecycle of</div>
    <div>Machine Learning</div>
  </div>

  
        <div class="sphere bg-orange" style="left: 335.0px; top: 30.0px; z-index: 10;">
          <svg class="icon" viewBox="30 0 70 70"><ellipse cx="65" cy="25" rx="18" ry="6"/><path d="M47 25 v20 a18 6 0 0 0 36 0 v-20"/><path d="M47 35 a18 6 0 0 0 36 0"/></svg>
          Data<br>Collection
        </div>
        <div class="sphere bg-green" style="left: 553.7429987478853px; top: 188.9260912937621px; z-index: 10;">
          <svg class="icon" viewBox="30 0 70 70"><polygon points="45 20, 85 20, 70 35, 70 50, 60 45, 60 35"/></svg>
          Data<br>Preprocessing
        </div>
        <div class="sphere bg-yellow" style="left: 470.1906080272688px; top: 446.07390870623794px; z-index: 10;">
          <svg class="icon" viewBox="30 0 70 70"><circle cx="65" cy="20" r="4"/><circle cx="50" cy="35" r="4"/><circle cx="80" cy="35" r="4"/><circle cx="65" cy="50" r="4"/><path d="M65 24 L50 31 M65 24 L80 31 M50 39 L65 46 M80 39 L65 46 M50 35 L80 35"/></svg>
          Model<br>Training
        </div>
        <div class="sphere bg-red" style="left: 199.8093919727312px; top: 446.07390870623794px; z-index: 10;">
          <svg class="icon" viewBox="30 0 70 70"><rect x="52" y="20" width="26" height="32" rx="2"/><path d="M60 20 v-3 h10 v3"/><path d="M57 28 l3 3 l6 -6"/><path d="M57 38 l3 3 l6 -6"/></svg>
          Model<br>Evaluation
        </div>
        <div class="sphere bg-purple" style="left: 116.25700125211466px; top: 188.9260912937621px; z-index: 10;">
          <svg class="icon" viewBox="30 0 70 70"><path d="M55 42 a8 8 0 0 1 -4 -15 a12 12 0 0 1 23 -4 a8 8 0 0 1 2 15 z"/></svg>
          Model<br>Deployment
        </div>

</div>

</body>
</html>
